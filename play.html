<body class="min-h-screen bg-dark text-white font-sans overflow-x-hidden hex-pattern">
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <!-- Navbar -->
    <nav class="glassmorphism fixed top-0 left-0 right-0 z-50 border-b border-white/10">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="index.html" class="flex items-center space-x-2 text-decoration-none">
                    <div
                        class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                        <i class="fas fa-brain text-white"></i>
                    </div>
                    <span class="text-2xl font-orbitron font-bold text-primary">SYNAPSE AI</span>
                </a>
            </div>
            <div class="hidden md:flex items-center space-x-6">
                <a href="index.html" class="nav-underline text-gray-300 hover:text-white">Home</a>
                <a href="games.html" class="nav-underline active text-gray-300 hover:text-white">Games</a>
                <a href="proxy.html" class="nav-underline text-gray-300 hover:text-white">Proxy</a>
                <a href="chatroom.html" class="nav-underline text-gray-300 hover:text-white relative">Chat <div
                        class="chatroom-badge notif-badge">0</div></a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 min-h-screen relative z-10">
        <div class="container mx-auto px-4">

            <div class="flex flex-col lg:flex-row gap-6 items-start justify-center">

                <!-- LEFT SIDEBAR AD -->
                <div class="hidden lg:block w-[160px] flex-shrink-0">
                    <div class="ad-fixed-container ad-placeholder" data-key="81f56b1bdcad21cd55ab223c4f4c2c92"
                        data-height="600" data-width="160"></div>
                </div>

                <!-- MAIN GAME AREA -->
                <div class="flex-grow w-full max-w-5xl">
                    <!-- Game Header -->
                    <div class="flex items-center justify-between mb-4 glassmorphism p-4 rounded-xl">
                        <button onclick="history.back()"
                            class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <h1 id="gameTitle"
                            class="text-xl md:text-2xl font-orbitron font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">
                            Loading...</h1>
                        <button onclick="toggleFullscreen('gameFrame')"
                            class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-expand"></i> Fullscreen
                        </button>
                    </div>

                    <!-- Game Iframe Container -->
                    <div id="gameContainer"
                        class="game-container glassmorphism p-1 rounded-xl relative aspect-video bg-black shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                        <iframe id="gameFrame" src="about:blank" allow="fullscreen; autoplay; gamepad; clipboard-write;"
                            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock"></iframe>
                    </div>

                    <!-- Game Info & Bottom Ad -->
                    <div class="mt-6 flex flex-col md:flex-row gap-6">
                        <div class="flex-grow glassmorphism p-6 rounded-xl">
                            <h3 class="text-lg font-bold mb-2 font-orbitron"><i
                                    class="fas fa-info-circle text-primary mr-2"></i> About This Game</h3>
                            <p id="gameDesc" class="text-gray-400 text-sm">Select a game to see details here.</p>
                        </div>
                        <div class="flex-shrink-0 glassmorphism p-6 rounded-xl flex justify-center items-center">
                            <!-- Bottom/Side Ad -->
                            <div class="ad-fixed-container ad-placeholder" data-key="3733036881765c9772591b356073c683"
                                data-height="250" data-width="300"></div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SIDEBAR AD -->
                <div class="hidden lg:block w-[160px] flex-shrink-0">
                    <div class="ad-fixed-container ad-placeholder" data-key="81f56b1bdcad21cd55ab223c4f4c2c92"
                        data-height="600" data-width="160"></div>
                </div>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="games.js"></script>
    <script src="script.js"></script>

    <script>
        // 1. GAME LOADER
        function loadGame() {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('game');

            if (!gameId || typeof games === 'undefined') {
                document.getElementById('gameTitle').textContent = "Game Not Found";
                return;
            }

            // Find game in games.js
            const game = games.find(g => g.id === gameId);

            if (game) {
                document.title = "Play " + game.name + " | Synapse";
                document.getElementById('gameTitle').textContent = game.name;
                document.getElementById('gameDesc').textContent = "Playing " + game.name + ". " + (game.category ? "Category: " + game.category : "");

                const frame = document.getElementById('gameFrame');

                // DIRECT LOADING (No Proxy wrapping)
                console.log("Loading Game:", game.url);
                frame.src = game.url;

            } else {
                document.getElementById('gameTitle').textContent = "Game Not Found";
            }
        }

        // 2. AD LOADER (High Performance Format)
        function lazyLoadAds() {
            const placeholders = document.querySelectorAll('.ad-placeholder');
            placeholders.forEach((placeholder, index) => {
                setTimeout(() => {
                    const key = placeholder.getAttribute('data-key');
                    const height = placeholder.getAttribute('data-height');
                    const width = placeholder.getAttribute('data-width');

                    if (!key) return;

                    placeholder.classList.remove('ad-placeholder');
                    placeholder.innerHTML = ''; // Clear loading text

                    const iframe = document.createElement('iframe');
                    iframe.width = width;
                    iframe.height = height;
                    iframe.frameBorder = "0";
                    iframe.scrolling = "no";
                    iframe.style.border = "none";

                    // srcdoc for instant rendering without blocking
                    iframe.srcdoc = `
                        <body style="margin:0;padding:0;background:transparent;display:flex;justify-content:center;align-items:center;">
                            <script type="text/javascript">
                                atOptions = { 'key': '${key}', 'format': 'iframe', 'height': ${height}, 'width': ${width}, 'params': {} };
                            <\/script>
                            <script type="text/javascript" src="//www.highperformanceformat.com/${key}/invoke.js"><\/script>
                        </body>
                    `;
                    placeholder.appendChild(iframe);
                }, index * 150); // Stagger load slightly
            });
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadGame();
            lazyLoadAds();
        });
    </script>
</body>

</html>
