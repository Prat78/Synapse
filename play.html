<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game - Synapse AI Unblocked Games</title>
    <meta name="description"
        content="Play your favorite unblocked games directly in your browser with Synapse AI. Enjoy fast loading, full-screen mode, and a massive library of school-safe games.">
    <meta name="keywords"
        content="play games, unblocked games, browser games, Synapse gaming, school unblocked, free online games">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

        crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            background: #000;
            font-family: Arial
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100
        }

        .header a,
        .header button {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px
        }

        .back {
            background: rgba(255, 255, 255, 0.1)
        }

        .back:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        .fs {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd
        }

        .fs:hover {
            background: rgba(59, 130, 246, 0.5)
        }

        .title {
            font-weight: bold;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .game {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 0
        }

        .game iframe {
            width: 100%;
            height: 100%;
            border: none
        }

        .loading {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        body.full .header {
            display: none
        }

        body.full .game {
            top: 0
        }

        /* Announcement styles copy */
        #globalAnnouncement {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            z-index: 10001;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Orbitron', Arial;
        }

        #globalAnnouncement.active {
            top: 60px;
        }

        .announcement-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #8b5cf6;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.4), inset 0 0 20px rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 24px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }

        .announcement-title {
            color: #8b5cf6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .announcement-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2e8f0;
        }

        .announcement-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #64748b;
            cursor: pointer;
            transition: color 0.3s;
        }

        .announcement-close:hover {
            color: white;
        }

        .neon-pulse {
            animation: neonPulse 1.5s infinite alternate;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 0 0 5px #8b5cf6, 0 0 10px #8b5cf6;
            }

            to {
                text-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6, 0 0 30px #8b5cf6;
            }
        }

        /* Load Warning Popup Styles */
        .load-warning {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-left: 5px solid #f59e0b;
            padding: 20px;
            border-radius: 16px;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(245, 158, 11, 0.1);
            z-index: 10002;
            display: flex;
            align-items: center;
            gap: 18px;
            transform: translateY(150%) scale(0.9);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 400px;
            pointer-events: none;
        }

        .load-warning.show {
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .load-warning i {
            color: #f59e0b;
            font-size: 24px;
            filter: drop-shadow(0 0 5px rgba(245, 158, 11, 0.5));
        }

        .load-warning .warning-content {
            flex: 1;
        }

        .load-warning .warning-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #f59e0b;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .load-warning .warning-text {
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            font-weight: 500;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="globalAnnouncement">
        <div class="announcement-card">
            <div class="announcement-close" onclick="closeGlobalAnnouncement()"><i class="fas fa-times"></i></div>
            <div class="announcement-title"><i class="fas fa-bullhorn neon-pulse mr-2"></i> Global Broadcast</div>
            <div class="announcement-text" id="announcementText">Connecting...</div>
        </div>
    </div>

    <!-- Load Warning Popup -->
    <div id="loadWarning" class="load-warning">
        <i class="fas fa-exclamation-triangle"></i>
        <div class="warning-content">
            <div class="warning-title">System Status</div>
            <div class="warning-text">Games may load slowly as too many people are loading games at the same time.</div>
        </div>
    </div>
    </div>
    <div class="header">
        <a href="index.html" class="back">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="title" id="title">Loading...</span>
            <button id="turboBtn" onclick="toggleTurbo()"
                style="background: rgba(234, 179, 8, 0.2); color: #fbbf24; border: 1px solid rgba(234, 179, 8, 0.5); font-size: 12px; display: flex; align-items: center; gap: 5px;">
                <i class="fas fa-bolt"></i> Turbo Mode: OFF
            </button>
        </div>
        <button class="fs" onclick="goFull()">
            <i class="fas fa-expand"></i> Fullscreen
        </button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading game...</p>
    </div>

    <div class="game" id="game" style="display:none">
        <iframe id="frame" allow="autoplay;fullscreen;gamepad" allowfullscreen title="Unblocked Game Player"></iframe>
    </div>

    <!-- SEO Internal Links -->
    <footer
        style="margin-top: 50px; padding: 20px; text-align: center; color: #4b5563; font-size: 12px; background: #0f172a;">
        <div style="margin-bottom: 10px;">
            <a href="index.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">Home</a>
            <a href="chat.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">AI Chat</a>
            <a href="games.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">Games</a>
            <a href="proxy.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">Online Games</a>
            <a href="chatroom.html"
                style="color: #60a5fa; margin: 0 10px; text-decoration: none; position: relative;">Chatroom <div
                    class="chatroom-badge notif-badge">0</div></a>
            <a href="feedback.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">Feedback</a>
            <a href="policy.html" style="color: #60a5fa; margin: 0 10px; text-decoration: none;">Policy</a>
        </div>
        <p>&copy; 2024 Synapse AI - Best Unblocked Games Platform</p>
    </footer>

    <script>
        // Get game data from sessionStorage
        var game = sessionStorage.getItem('currentGame');

        if (!game) {
            // No game data, redirect back
            window.location.href = 'index.html';
        } else {
            try {
                game = JSON.parse(game);

                // Set title
                document.getElementById('title').textContent = game.name || game.title || 'Game';
                document.title = (game.name || game.title || 'Game') + ' - Play Unblocked on Synapse AI';

                // Load game in iframe
                var iframe = document.getElementById('frame');
                iframe.src = game.link;

                // Show game container when iframe loads
                iframe.onload = function () {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('game').style.display = 'block';
                };

                // Fallback: show game after 3 seconds even if onload doesn't fire
                setTimeout(function () {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('game').style.display = 'block';
                }, 3000);

                // Show Load Warning Popup
                setTimeout(function () {
                    const warning = document.getElementById('loadWarning');
                    if (warning) {
                        warning.classList.add('show');
                        // Auto-hide after 8 seconds
                        setTimeout(() => {
                            warning.classList.remove('show');
                        }, 8000);
                    }
                }, 1000);

            } catch (e) {
                console.error('Error loading game:', e);
                alert('Error loading game. Redirecting back...');
                window.location.href = 'index.html';
            }
        }

        function goFull() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            document.body.classList.add('full');
        }

        // Remove fullscreen class when exiting fullscreen
        document.addEventListener('fullscreenchange', function () {
            if (!document.fullscreenElement) {
                document.body.classList.remove('full');
            }
        });
        document.addEventListener('webkitfullscreenchange', function () {
            if (!document.webkitFullscreenElement) {
                document.body.classList.remove('full');
            }
        });

        // ===========================
        // Turbo Mode Logic
        // ===========================
        let turboActive = false;

        function toggleTurbo(silent = false) {
            turboActive = !turboActive;
            const btn = document.getElementById('turboBtn');
            const iframe = document.getElementById('frame');

            if (turboActive) {
                // Activate Turbo
                btn.style.background = "rgba(16, 185, 129, 0.3)";
                btn.style.color = "#10b981";
                btn.style.borderColor = "rgba(16, 185, 129, 0.5)";
                btn.innerHTML = '<i class="fas fa-bolt animate-pulse"></i> Turbo: ON';

                // 1. Extreme Memory Purge: Hide ALL non-essential DOM
                const footer = document.querySelector('footer');
                if (footer) footer.style.display = 'none';

                // 2. Browser priority hint
                if (iframe) {
                    iframe.setAttribute('importance', 'high');
                    // "Blink" the iframe to force a memory re-check
                    iframe.style.opacity = "0.99";
                    setTimeout(() => { if (iframe) iframe.style.opacity = "1"; }, 100);
                }

                // 3. Clear Parent Page memory
                window.gc && window.gc();

                if (!silent) {
                    alert("🚀 EXTREME TURBO ACTIVE\n- Page memory cleared.\n- Iframe priority set to HIGH.\n\nNOTE: If lag returns, click Turbo OFF and then ON again to 'flush' the memory!");
                }
            } else {
                // Deactivate
                btn.style.background = "rgba(234, 179, 8, 0.2)";
                btn.style.color = "#fbbf24";
                btn.style.borderColor = "rgba(234, 179, 8, 0.5)";
                btn.innerHTML = '<i class="fas fa-bolt"></i> Turbo: OFF';

                const footer = document.querySelector('footer');
                if (footer) footer.style.display = 'block';
            }
        }

        // Auto-enable Turbo Mode when game starts
        setTimeout(() => toggleTurbo(true), 100);

        // ===========================
        // Global Broadcast Logic for Play Page
        // ===========================
        const firebaseConfig = {
            apiKey: "AIzaSyB4p6X2u5thYySUjgCnjQeYZYQ87xg-xds",
            authDomain: "chatroom-f1e6b.firebaseapp.com",
            databaseURL: "https://chatroom-f1e6b-default-rtdb.firebaseio.com",
            projectId: "chatroom-f1e6b",
            storageBucket: "chatroom-f1e6b.firebasestorage.app",
            messagingSenderId: "663028089072",
            appId: "1:663028089072:web:04f2706fd3f5badf334235",
            measurementId: "G-ZT0KHEJ77Y"
        };

        function initAnnouncements() {
            if (typeof firebase === 'undefined') return;
            try {
                const app = firebase.initializeApp(firebaseConfig, "announcementApp");
                const db = firebase.database(app);
                const ref = db.ref('global_announcements');
                let lastTimestamp = Date.now();

                ref.on('value', (snapshot) => {
                    if (!snapshot.exists()) return;
                    const data = snapshot.val();
                    if (data.timestamp && data.timestamp > lastTimestamp) {
                        lastTimestamp = data.timestamp;
                        showAnnouncement(data);
                    }
                });
            } catch (e) { console.error(e); }
        }

        function showAnnouncement(data) {
            const el = document.getElementById('globalAnnouncement');
            const txt = document.getElementById('announcementText');
            if (!el || !txt) return;

            txt.innerHTML = data.adminName ? `<strong>From ${data.adminName}:</strong> ${data.text}` : data.text;
            el.classList.add('active');
            setTimeout(closeGlobalAnnouncement, 15000);
        }

        function closeGlobalAnnouncement() {
            const el = document.getElementById('globalAnnouncement');
            if (el) el.classList.remove('active');
        }

        // Load Firebase Scripts and init
        (function loadFirebase() {
            const scripts = [
                "https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js",
                "https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"
            ];
            let loaded = 0;
            scripts.forEach(src => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => {
                    loaded++;
                    if (loaded === scripts.length) initAnnouncements();
                };
                document.head.appendChild(s);
            });
        })();
    </script>
</body>

</html>
